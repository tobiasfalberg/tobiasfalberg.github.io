<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Tobias Falberg – Textris</title>

<meta name="description" content="Tobias Falberg – Bild-Text-Gedichte, Plastiniertes Gelände, Wir singen das Wort Kerosin. Experimentelle Literatur mit Textris.">

<style>
body {
  background:#050505;
  margin:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  height:100vh;
  font-family: monospace;
  color:#66ffcc;
}

/* NAV */
nav {
  width:100%;
  background:#111;
  padding:10px;
  display:flex;
  gap:1em;
  position:fixed;
  top:0;
  left:0;
  z-index:10;
}

nav a {
  color:#66ffcc;
  text-decoration:none;
  font-weight:bold;
}

/* TITLE */
#title {
  font-size:26px;
  margin:70px 0 10px 0;
  transition:0.5s;
}

.explode {
  color:red !important;
  transform:scale(2);
  letter-spacing:10px;
}

/* SEO TEXT */
#seoText {
  font-size:14px;
  color:#66ffcc;
  opacity:1;
  transition:opacity 2s ease;
}

#seoText.fade-out {
  opacity:0;
}

/* PIXELS */
.pixel {
  position:fixed;
  width:6px;
  height:6px;
  background:#ff4444;
  pointer-events:none;
  z-index:999;
}

/* HUD */
#hud { position:fixed; top:50px; left:15px; }
#inputBox { position:fixed; top:110px; left:15px; }

textarea {
  width:260px;
  height:70px;
  background:#111;
  color:#eee;
}

#clearBtn { position:fixed; bottom:20px; right:20px; }

#grid {
  display:grid;
  grid-template-columns:repeat(13,22px);
  grid-template-rows:repeat(26,22px);
  margin-top:200px;
}

.cell {
  width:22px;
  height:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
}

.word { color:white; }
.frozen { outline:1px solid rgba(255,255,255,0.3); }
</style>
</head>

<body>

<nav>
  <a href="/">Textris</a>
  <a href="/about/">Über mich</a>
  <a href="/publications/">Veröffentlichungen</a>
  <a href="/vita/">Vita</a>
</nav>

<div id="title">Textris</div>

<!-- SEO Fade Text -->
<div id="seoText">
  Tobias Falberg – Bild-Text-Gedichte · Plastiniertes Gelände · Wir singen das Wort Kerosin
</div>

<div id="hud">Wörter:0<br>Schübe:0<br>Zeit:0.0s<br>Level:0</div>

<div id="inputBox">
<textarea id="userWords"></textarea><br>
<button onclick="start()">Start</button>
</div>

<button id="clearBtn" onclick="init()">Clear</button>

<div id="grid"></div>

<script>

/* SEO Fade */
window.addEventListener("load", () => {
  setTimeout(() => {
    document.getElementById("seoText").classList.add("fade-out");
  }, 1200);
});

/* GRID BASIC */
const W=13,H=26;
let grid=[],running=false;

/* INIT */
function init(){
  const el=document.getElementById("grid");
  el.innerHTML="";
  grid=[];
  for(let y=0;y<H;y++){
    let row=[];
    for(let x=0;x<W;x++){
      row.push({});
      let d=document.createElement("div");
      d.className="cell";
      el.appendChild(d);
    }
    grid.push(row);
  }
}

/* START */
function start(){
  running=true;
}

/* EXPLOSION */
function explodeTitle(){
  const title=document.getElementById("title");
  title.classList.add("explode");

  const rect=title.getBoundingClientRect();

  for(let i=0;i<80;i++){
    const p=document.createElement("div");
    p.className="pixel";
    p.style.left=(rect.left+rect.width/2)+"px";
    p.style.top=(rect.top+rect.height/2)+"px";

    document.body.appendChild(p);

    const angle=Math.random()*2*Math.PI;
    const dist=100+Math.random()*200;

    const x=Math.cos(angle)*dist;
    const y=Math.sin(angle)*dist;

    p.animate([
      {transform:"translate(0,0)",opacity:1},
      {transform:`translate(${x}px,${y}px)`,opacity:0}
    ],{
      duration:800,
      easing:"ease-out"
    });

    setTimeout(()=>p.remove(),800);
  }
}

/* SIMULATE END (TEST) */
setTimeout(()=>{
  explodeTitle();
},5000);

init();
</script>

</body>
</html>
