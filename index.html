let gameInterval;
const gameContainer = document.getElementById("gameContainer");
const startBtn = document.getElementById("startBtn");
const clearBtn = document.getElementById("clearBtn");

function randomPosition(wordEl) {
  const x = Math.random() * (window.innerWidth - wordEl.offsetWidth);
  const y = Math.random() * (window.innerHeight - wordEl.offsetHeight);
  wordEl.style.left = x + "px";
  wordEl.style.top = y + "px";
}

function createWord() {
  const wordEl = document.createElement("div");
  wordEl.className = "word";
  wordEl.textContent = words[Math.floor(Math.random() * words.length)];
  randomPosition(wordEl);
  gameContainer.appendChild(wordEl);
  moveWord(wordEl);
}

function moveWord(wordEl) {
  let dx = (Math.random() - 0.5) * 2; // Geschwindigkeit X
  let dy = (Math.random() - 0.5) * 2; // Geschwindigkeit Y

  function animate() {
    const rect = wordEl.getBoundingClientRect();
    let x = rect.left + dx;
    let y = rect.top + dy;

    if (x < 0 || x + rect.width > window.innerWidth) dx = -dx;
    if (y < 0 || y + rect.height > window.innerHeight) dy = -dy;

    wordEl.style.transform = `translate(${x - rect.left}px, ${y - rect.top}px)`;
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
}

function startGame() {
  clearGame();
  gameInterval = setInterval(createWord, 500);
}

function clearGame() {
  clearInterval(gameInterval);
  gameContainer.innerHTML = "";
}

startBtn.addEventListener("click", startGame);
clearBtn.addEventListener("click", clearGame);
