const W=13,H=26;
let grid=[],words=[],used=new Set();
let running=false;
let pushCount=0,wordCount=0,startTime=0;
let wordsList=[...baseWords];
let prefixSet=new Set();
let audioCtx;

function initAudio(){ if(!audioCtx){ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }}
function tone(f,d=0.1,v=0.05){ let o=audioCtx.createOscillator(); let g=audioCtx.createGain(); o.frequency.value=f; g.gain.value=v; o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+d);}
function beep(){tone(180,0.05,0.03);}
function ding(){tone(700,0.12,0.05);}
function finale(){[400,500,650,450,560,700,520,660,800].forEach((f,i)=>setTimeout(()=>tone(f,0.2,0.05),i*120));}

function randLetter(){const l="eeeeennnrrrrtttddddaaaaiiiissshhhllluuäöüß"; return l[Math.floor(Math.random()*l.length)];}
function rebuildPrefixes(){prefixSet.clear(); wordsList.forEach(w=>{for(let i=1;i<=w.length;i++){prefixSet.add(w.slice(0,i));}});}
function init(){
  const el=document.getElementById("grid"); el.innerHTML="";
  grid=[];words=[];used.clear(); running=false; pushCount=0; wordCount=0; startTime=0;
  document.getElementById("title").classList.remove("explode");
  for(let y=0;y<H;y++){
    let row=[];
    for(let x=0;x<W;x++){
      row.push({char:randLetter(),word:null});
      let d=document.createElement("div");
      d.className="cell"; d.id=`c-${x}-${y}`; el.appendChild(d);
    }
    grid.push(row);
  }
  updateHUD(); render();
}

function start(){
  initAudio(); startTime = performance.now();
  let input=document.getElementById("userWords").value;
  if(input.trim()){ let extra=input.toLowerCase().replace(/[^a-zäöüß\s]/g," ").split(/\s+/).filter(w=>w.length>=2);
    wordsList=[...baseWords,...extra];
  } else { wordsList=[...baseWords]; }
  document.getElementById("userWords").value=""; rebuildPrefixes(); running=true; scheduleMove();
}

function getLevel(){let topMost=H; for(let y=0;y<H;y++){for(let x=0;x<W;x++){let c=grid[y][x]; if(c.word && c.word.frozen){if(y<topMost) topMost=y;}}} if(topMost===H) return 0; return H-topMost;}
function updateHUD(){let t=0; if(startTime){t=(performance.now()-startTime)/1000;} document.getElementById("hud").innerHTML=`Wörter:${wordCount}<br>Schübe:${pushCount}<br>Zeit:${t.toFixed(1)}s<br>Level:${getLevel()}`;}

function scan(){for(let y=0;y<H;y++){for(let x=0;x<W;x++){check(x,y,1,0);check(x,y,0,1);}}}
function check(x,y,dx,dy){let str="",pos=[];for(let i=0;i<10;i++){let cx=x+dx*i,cy=y+dy*i;if(cx<0||cy<0||cx>=W||cy>=H) break; let c=grid[cy][cx]; if(c.word) break; str+=c.char; pos.push([cx,cy]); if(!prefixSet.has(str)) break; if(wordsList.includes(str)&&!used.has(str)){ let w={id:words.length,letters:str,positions:pos,frozen:false}; pos.forEach((p,i)=>{let [x,y]=p; grid[y][x]={char:str[i],word:w};}); words.push(w); used.add(str); wordCount++; updateHUD(); return;}}}

function shouldFreeze(w){for(let [x,y] of w.positions){if(y===H-1) return true; let below=grid[y+1]?.[x]; if(below?.word && below.word.frozen) return true;} return false;}
function move(){if(!running) return; pushCount++; updateHUD(); beep(); for(let w of words){if(w.frozen) continue; if(shouldFreeze(w)){w.frozen=true; ding(); continue;} w.positions.forEach(([x,y])=>{if(grid[y][x].word===w){grid[y][x]={char:randLetter(),word:null};}}); w.positions=w.positions.map(([x,y])=>[x,y+1]); w.positions.forEach(([x,y],i)=>{grid[y][x]={char:w.letters[i],word:w};});} checkEnd();}
function checkEnd(){for(let x=0;x<W;x++){let c=grid[0][x]; if(c.word && c.word.frozen){running=false; document.getElementById("title").classList.add("explode"); finale();}}}
function speed(){if(pushCount>=400) return 1000; if(pushCount>=300) return 2000; if(pushCount>=200) return 3000; if(pushCount>=100) return 4000; return 5000;}
function scheduleMove(){if(!running) return; setTimeout(()=>{move(); scheduleMove();},speed());}
function step(){if(!running) return; for(let y=0;y<H;y++){for(let x=0;x<W;x++){if(!grid[y][x].word && Math.random()<0.02){grid[y][x].char=randLetter();}}} scan(); updateHUD(); render();}
function render(){for(let y=0;y<H;y++){for(let x=0;x<W;x++){let el=document.getElementById(`c-${x}-${y}`); let c=grid[y][x]; if(c.word){let w=c.word; el.innerHTML=`<div class="word w${w.id%6} ${w.frozen?"frozen":""}">${c.char}</div>`;}else{el.textContent=c.char;}}}}
setInterval(step,80); init();
</script>
