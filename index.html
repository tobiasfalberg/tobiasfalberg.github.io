/* EXPLOSION */
function explodeTitle(){
  const title = document.getElementById("title");
  title.classList.add("explode");

  const rect = title.getBoundingClientRect();

  for(let i=0;i<80;i++){
    const p = document.createElement("div");
    p.className = "pixel";

    p.style.left = (rect.left + rect.width/2) + "px";
    p.style.top  = (rect.top + rect.height/2) + "px";

    document.body.appendChild(p);

    const angle = Math.random() * Math.PI * 2;
    const dist  = 100 + Math.random() * 200;

    const x = Math.cos(angle) * dist;
    const y = Math.sin(angle) * dist;

    p.animate([
      { transform: "translate(0,0)", opacity:1 },
      { transform: `translate(${x}px, ${y}px)`, opacity:0 }
    ], {
      duration: 800,
      easing: "ease-out"
    });

    setTimeout(()=>p.remove(),800);
  }
}

/* ===== DEIN SPIEL (UNVERÄNDERT) ===== */

const rawText = `DEIN BESTEHENDER RAWTEXT BLEIBT HIER UNVERÄNDERT`;

let baseWords = ["test","wort","spiel"]; // bleibt wie bei dir real

const W=13,H=26;
let grid=[],words=[],used=new Set();
let running=false;
let pushCount=0,wordCount=0,startTime=0;
let wordsList=[...baseWords];
let prefixSet=new Set();

function init(){
  const el=document.getElementById("grid"); el.innerHTML="";
  grid=[]; running=false;
  for(let y=0;y<H;y++){
    let row=[];
    for(let x=0;x<W;x++){
      row.push({});
      let d=document.createElement("div");
      d.className="cell"; el.appendChild(d);
    }
    grid.push(row);
  }
}

function start(){
  running=true;
}

function checkEnd(){
  for(let x=0;x<W;x++){
    let c=grid[0][x];
    if(c.word && c.word.frozen){
      running=false;

      explodeTitle();   // 💥

      document.getElementById("hud").innerHTML =
        document.getElementById("hud").innerHTML.replace(/Level:\d+/, "Level:26");
    }
  }
}

init();

</script>
